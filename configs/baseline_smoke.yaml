model_name: meta-llama/Llama-3.2-3B-Instruct

method: baseline
dataset_name: qa820
dataset_path: data/raw/qa_generations_820_12_annotated.json

n_samples: 3
seed_dataset: 42
generation_seed: 42

k: 3
temperature: 0.5
top_p: 0.99
top_k: 5
max_new_tokens: 16

alpha: 0.001
embedding_layer: middle
embedding_token: last
eigenscore_mode: legacy

prompt_instruction: "Answer with one short sentence or a short phrase. Do not give lists. Do not explain."

use_feature_clipping: false

rouge_l_threshold: 0.85
token_overlap_threshold: 0.8
